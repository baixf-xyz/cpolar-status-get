name: Node.js CI

on:
  workflow_dispatch:
  # 可选：取消注释以启用定时任务（例如每天凌晨1点和下午1点）
  # schedule: 
  #   - cron: '0 1,13 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 更新为受支持的 Node.js 版本
        # 参考：v24 (Active LTS) 或 v20 (Maintenance LTS)
        node-version: [24.x] 

    steps:
    - uses: actions/checkout@v4 # 建议升级 checkout 版本
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4 # 建议升级 action 版本
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: npm install
      run: npm install
    
    - name: Get Status
      run: npm start
      env:
          CPOLAR_EMAIL: ${{ secrets.CPOLAR_EMAIL }}
          CPOLAR_PASSWORD: ${{ secrets.CPOLAR_PASSWORD }}

    - name: Send mail ✉️
      uses: dawidd6/action-send-mail@v3 # 建议检查是否有更新版本
      with:
        server_address: smtp.qq.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: cpolar今日状态
        body: file://index.html
        to: 707401057@qq.com
        from: GitHub Actions
        content_type: text/html
        convert_markdown: true
